<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Շենքերի ցուցակ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <div class="logo">
    <a href="index.html">
        <img src="images/Coat of arm.png" alt="Գերբ Երևան">
    </a>
</div>
    <h1>Շենքերի Ցուցակ</h1>
</header>

<main>
    <section id="building-list">
        <div class="card">
            <img src="images/opera.jpg" alt="Օպերայի թատրոն">
            <h3>Օպերայի թատրոն</h3>
            <p>Երևանի խորհրդանիշներից մեկը։</p>
        </div>

        <div class="card">
            <img src="images/square.jpg" alt="Հանրապետության հրապարակ">
            <h3>Հանրապետության հրապարակ</h3>
            <p>Քաղաքի կենտրոնը։</p>
        </div>

        <div class="card">
            <img src="images/cascade.jpg" alt="Կասկադ">
            <h3>Կասկադ</h3>
            <p>Ժամանակակից ճարտարապետություն։</p>
        </div>
    </section>
</main>

</body>
</html>
